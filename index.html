<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes - Final Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .menu-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .menu-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .menu-scroll:hover::-webkit-scrollbar-thumb { background: #64748b; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden touch-none">
    <div id="root"></div>
    <script type="text/babel">
        // 1. SETUP FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDxJWz15biwT7k3YsupIghBVBPtICNNkfo",
            authDomain: "notes-tracker-8e97d.firebaseapp.com",
            projectId: "notes-tracker-8e97d",
            storageBucket: "notes-tracker-8e97d.firebasestorage.app",
            messagingSenderId: "480733039726",
            appId: "1:480733039726:web:9b051f3b15cf735aac6a7f"
        };

        // 🌟 GATEKEEPER
        const authStatus = localStorage.getItem('isLoggedIn');
        if (authStatus !== 'true') {
             window.location.href = "login.html";
        }

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const { useState, useEffect, useRef } = React;

        // 2. KOMPONEN UTAMA
        function App() {
            const [notes, setNotes] = useState([]);
            const [menuPos, setMenuPos] = useState('left');
            const [searchQuery, setSearchQuery] = useState(''); 
            
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [zoom, setZoom] = useState(1);
            const isPanning = useRef(false);
            const panStart = useRef({ x: 0, y: 0 });
            const pointers = useRef(new Map()); 
            const pinchState = useRef({ dist: 0, zoom: 1, cx: 0, cy: 0, panX: 0, panY: 0 });

            useEffect(() => {
                const unsubscribe = db.collection("notes").onSnapshot((snapshot) => {
                    const loadedNotes = [];
                    snapshot.forEach((doc) => { loadedNotes.push({ id: doc.id, ...doc.data() }); });
                    setNotes(loadedNotes);
                });
                return () => unsubscribe();
            }, []);

            const addItem = (type) => {
                const newId = Date.now().toString();
                const newItemX = (window.innerWidth / 2 - pan.x) / zoom - 150;
                const newItemY = (window.innerHeight / 2 - pan.y) / zoom - 100;
                
                let newNote = { id: newId, type, text: "", url: "", imageUrl: "", x: newItemX, y: newItemY };
                if (type === 'todo') {
                    newNote.tasks = [{ text: '', done: false }]; 
                }
                
                db.collection("notes").doc(newId).set(newNote);
            };

            return (
                <div className="fixed inset-0 w-full h-[100dvh] bg-gray-100 overflow-hidden cursor-move touch-none"
                    onPointerDown={(e) => {
                        pointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
                        
                        if (pointers.current.size === 1) {
                            if (e.button === 2 || (e.pointerType === 'touch' && e.target.id === 'canvas-bg')) {
                                isPanning.current = true;
                                e.currentTarget.setPointerCapture(e.pointerId);
                                panStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                            }
                        } else if (pointers.current.size === 2) {
                            isPanning.current = false;
                            const pts = Array.from(pointers.current.values());
                            const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                            const cx = (pts[0].x + pts[1].x) / 2;
                            const cy = (pts[0].y + pts[1].y) / 2;
                            pinchState.current = { dist, zoom, cx, cy, panX: pan.x, panY: pan.y };
                        }
                    }}
                    onPointerMove={(e) => {
                        if (!pointers.current.has(e.pointerId)) return;
                        pointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });

                        if (pointers.current.size === 2) {
                            const pts = Array.from(pointers.current.values());
                            const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                            const cx = (pts[0].x + pts[1].x) / 2;
                            const cy = (pts[0].y + pts[1].y) / 2;

                            const scale = dist / pinchState.current.dist;
                            const newZ = Math.min(Math.max(0.2, pinchState.current.zoom * scale), 3);

                            setZoom(newZ);
                            setPan({
                                x: cx - (pinchState.current.cx - pinchState.current.panX) * (newZ / pinchState.current.zoom),
                                y: cy - (pinchState.current.cy - pinchState.current.panY) * (newZ / pinchState.current.zoom)
                            });
                        } else if (pointers.current.size === 1 && isPanning.current) {
                            setPan({ x: e.clientX - panStart.current.x, y: e.clientY - panStart.current.y });
                        }
                    }}
                    onPointerUp={(e) => {
                        pointers.current.delete(e.pointerId);
                        if (pointers.current.size === 1) {
                            const [remainingPointer] = pointers.current.values();
                            panStart.current = { x: remainingPointer.x - pan.x, y: remainingPointer.y - pan.y };
                        } else if (pointers.current.size === 0) {
                            isPanning.current = false;
                            e.currentTarget.releasePointerCapture(e.pointerId);
                        }
                    }}
                    onPointerCancel={(e) => {
                        pointers.current.delete(e.pointerId);
                        isPanning.current = false;
                    }}
                    onWheel={(e) => {
                        const speed = 0.001; 
                        const zoomFactor = 1 - e.deltaY * speed;
                        setZoom(prev => {
                            const newZ = Math.min(Math.max(0.2, prev * zoomFactor), 3);
                            setPan(p => ({
                                x: e.clientX - (e.clientX - p.x) * (newZ / prev),
                                y: e.clientY - (e.clientY - p.y) * (newZ / prev)
                            }));
                            return newZ;
                        });
                    }}
                    onContextMenu={(e) => e.preventDefault()}
                >
                    <div className="fixed top-4 right-4 z-[100]" onPointerDown={e => e.stopPropagation()}>
                        <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                            <input 
                                type="text" 
                                placeholder="Cari nota, task..." 
                                className="p-2 pl-9 rounded-full shadow-lg border border-gray-200 outline-none focus:border-blue-400 bg-white w-48 focus:w-64 transition-all text-sm font-medium"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>
                    </div>

                    <div className={`fixed z-[100] flex gap-3 bg-white p-3 rounded-xl shadow-lg border border-gray-200 transition-all duration-300 menu-scroll ${menuPos === 'left' ? 'flex-col left-4 top-1/2 -translate-y-1/2 max-h-[80vh] overflow-y-auto' : 'flex-row bottom-6 left-1/2 -translate-x-1/2 max-w-[90vw] overflow-x-auto'} cursor-default`} onPointerDown={e => e.stopPropagation()}>
                        <button onClick={() => setMenuPos(p => p === 'left' ? 'top' : 'left')} className="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition text-xl">🔄</button>
                        <div className={menuPos === 'left' ? 'w-full h-px bg-gray-200 my-1' : 'w-px h-full bg-gray-200 mx-1'}></div>
                        <button onClick={() => addItem('text')} className="w-12 h-12 shrink-0 bg-yellow-100 rounded-lg shadow-sm hover:scale-110 transition text-xl">📝</button>
                        <button onClick={() => addItem('link')} className="w-12 h-12 shrink-0 bg-blue-100 rounded-lg shadow-sm hover:scale-110 transition text-xl">🔗</button>
                        <button onClick={() => addItem('todo')} className="w-12 h-12 shrink-0 bg-green-100 rounded-lg shadow-sm hover:scale-110 transition text-xl">✅</button>
                        <div className="flex items-center shrink-0 bg-gray-50 rounded-lg p-1 text-[10px] font-bold justify-center">{Math.round(zoom * 100)}%</div>
                    </div>

                    <div id="canvas-bg" className="w-[10000px] h-[10000px] absolute origin-top-left" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, backgroundImage: 'radial-gradient(#cbd5e1 2px, transparent 2px)', backgroundSize: '40px 40px' }}>
                        {notes.filter(note => {
                            if (!searchQuery) return true;
                            const q = searchQuery.toLowerCase();
                            const matchText = note.text && note.text.toLowerCase().includes(q);
                            const matchUrl = note.url && note.url.toLowerCase().includes(q);
                            const matchTasks = note.tasks && note.tasks.some(tsk => tsk.text.toLowerCase().includes(q));
                            return matchText || matchUrl || matchTasks;
                        }).map(note => <DraggableItem key={note.id} note={note} pan={pan} zoom={zoom} />)}
                    </div>
                </div>
            );
        }

        // 3. KOMPONEN ITEM
        function DraggableItem({ note, pan, zoom }) {
            const [position, setPosition] = useState({ x: note.x, y: note.y });
            const [isDragging, setIsDragging] = useState(false);
            const dragOffset = useRef({ x: 0, y: 0 });

            useEffect(() => {
                if (!isDragging) return;
                const handleGlobalMove = (e) => setPosition({ x: (e.clientX - pan.x) / zoom - dragOffset.current.x, y: (e.clientY - pan.y) / zoom - dragOffset.current.y });
                const handleGlobalUp = () => { setIsDragging(false); db.collection("notes").doc(note.id).update({ x: position.x, y: position.y }); };
                window.addEventListener('pointermove', handleGlobalMove);
                window.addEventListener('pointerup', handleGlobalUp);
                return () => { window.removeEventListener('pointermove', handleGlobalMove); window.removeEventListener('pointerup', handleGlobalUp); };
            }, [isDragging, zoom, pan, position]);

            const handleUrlSave = async (e) => {
                let newUrl = e.target.value.trim();
                if(!newUrl || newUrl === note.url) return;

                if (!newUrl.startsWith('http')) {
                    newUrl = 'https://' + newUrl;
                }

                if (newUrl.includes('threads.net') || newUrl.includes('threads.com')) {
                    let cleanThreads = newUrl.replace('threads.com', 'threads.net').split('?')[0].replace(/\/+$/, '');
                    db.collection("notes").doc(note.id).update({ url: cleanThreads, imageUrl: 'threads-embed' });
                    return;
                }

                if (newUrl.includes('instagram.com')) {
                    let cleanIG = newUrl.split('?')[0].replace(/\/+$/, '');
                    db.collection("notes").doc(note.id).update({ url: cleanIG, imageUrl: 'instagram-embed' }); 
                    return;
                }

                if (newUrl.includes('dropbox.com')) {
                    try {
                        let tUrl = new URL(newUrl);
                        const isPdf = tUrl.pathname.toLowerCase().endsWith('.pdf');
                        tUrl.hostname = isPdf ? 'www.dropbox.com' : 'dl.dropboxusercontent.com';
                        tUrl.searchParams.delete('dl'); tUrl.searchParams.set('raw', '1');
                        db.collection("notes").doc(note.id).update({ url: newUrl, imageUrl: tUrl.toString() });
                        return;
                    } catch(err) {}
                }

                try {
                    const res = await fetch(`https://api.microlink.io?url=${encodeURIComponent(newUrl)}`);
                    const data = await res.json();
                    db.collection("notes").doc(note.id).update({ url: newUrl, imageUrl: data.data?.image?.url || "" });
                } catch(err) { db.collection("notes").doc(note.id).update({ url: newUrl }); }
            };

            const isPdf = note.imageUrl && note.imageUrl.toLowerCase().includes('.pdf');

            return (
                <div className={`group absolute w-[350px] h-auto min-h-[100px] shadow-lg border rounded-xl bg-white flex flex-col hover:shadow-xl transition-shadow`}
                    style={{ left: position.x, top: position.y, zIndex: isDragging ? 100 : 10 }}>
                    
                    <div onPointerDown={(e) => { e.stopPropagation(); e.target.setPointerCapture(e.pointerId); setIsDragging(true); dragOffset.current = { x: (e.clientX - pan.x) / zoom - position.x, y: (e.clientY - pan.y) / zoom - position.y }; }} 
                        className="drag-handle h-8 w-full bg-black/5 cursor-grab active:cursor-grabbing rounded-t-xl flex items-center justify-center relative touch-none">
                        <div className="w-10 h-1.5 bg-black/70 rounded-full pointer-events-none"></div>
                        <button onClick={() => { if(confirm("Buang kotak ni?")) db.collection("notes").doc(note.id).delete(); }} className="absolute -right-2 -top-2 w-6 h-6 bg-red-500 text-white rounded-full font-bold text-xs shadow-md">✕</button>
                    </div>

                    <div className="p-4 pt-1 h-auto">
                        {note.type === 'text' ? (
                            <textarea className="w-full h-full min-h-[100px] bg-transparent outline-none resize-none font-medium text-gray-800 mt-2 menu-scroll" defaultValue={note.text} onBlur={(e) => db.collection("notes").doc(note.id).update({ text: e.target.value })} onPointerDown={e => e.stopPropagation()} />
                        
                        ) : note.type === 'todo' ? (
                            <div className="flex flex-col w-full mt-2" onPointerDown={e => e.stopPropagation()}>
                                <input type="text" className="font-bold text-sm outline-none mb-3 bg-transparent border-b border-gray-200 pb-1" placeholder="Tajuk To-Do..." defaultValue={note.text} onBlur={e => db.collection("notes").doc(note.id).update({ text: e.target.value })} />
                                <div className="flex flex-col gap-2 max-h-[400px] overflow-y-auto menu-scroll">
                                    {(note.tasks || []).map((task, idx) => (
                                        <div key={idx} className="flex items-start gap-2 group">
                                            <input type="checkbox" className="mt-1.5 cursor-pointer w-4 h-4 accent-green-500 shrink-0" checked={task.done} onChange={e => {
                                                const newTasks = [...(note.tasks || [])];
                                                newTasks[idx].done = e.target.checked;
                                                db.collection("notes").doc(note.id).update({ tasks: newTasks });
                                            }} />
                                            {/* 🌟 FIX BUGS: Default 3 Line & Logik Enter/Shift+Enter */}
                                            <textarea 
                                                className={`flex-1 outline-none resize-none bg-transparent text-sm max-h-[72px] overflow-y-auto menu-scroll ${task.done ? 'line-through text-gray-400' : 'text-gray-700'}`} 
                                                rows="3" 
                                                defaultValue={task.text} 
                                                placeholder="Tulis task..." 
                                                onBlur={e => {
                                                    const newTasks = [...(note.tasks || [])];
                                                    newTasks[idx].text = e.target.value;
                                                    db.collection("notes").doc(note.id).update({ tasks: newTasks });
                                                }}
                                                onKeyDown={e => {
                                                    if (e.key === 'Enter' && !e.shiftKey) {
                                                        e.preventDefault(); // Halang buat baris baru
                                                        const newTasks = [...(note.tasks || [])];
                                                        newTasks[idx].text = e.target.value; // Save teks sebelum tambah task
                                                        newTasks.push({ text: '', done: false });
                                                        db.collection("notes").doc(note.id).update({ tasks: newTasks });
                                                    }
                                                }}
                                            ></textarea>
                                            <button onClick={() => {
                                                const newTasks = (note.tasks || []).filter((_, i) => i !== idx);
                                                db.collection("notes").doc(note.id).update({ tasks: newTasks });
                                            }} className="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity p-1">✕</button>
                                        </div>
                                    ))}
                                    <button onClick={() => {
                                        const newTasks = [...(note.tasks || []), { text: '', done: false }];
                                        db.collection("notes").doc(note.id).update({ tasks: newTasks });
                                    }} className="text-xs text-blue-600 font-bold bg-blue-50 py-1.5 rounded-lg mt-1 hover:bg-blue-100 transition self-start px-3 shadow-sm">+ Tambah Task</button>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col gap-2 mt-1">
                                {(note.imageUrl === 'threads-embed' || note.imageUrl === 'instagram-embed') ? (
                                    <div key={note.url} className="rounded-xl overflow-hidden bg-white border border-gray-200 shadow-inner" onPointerDown={e => e.stopPropagation()}>
                                        <iframe src={`${note.url}/embed/`} className="w-full min-h-[450px] border-none block" scrolling="no" frameBorder="0" allowtransparency="true" allow="encrypted-media"></iframe>
                                    </div>
                                ) : note.imageUrl ? (
                                    <div className="rounded-lg overflow-hidden border border-gray-100 bg-white">
                                        {isPdf ? (
                                            <iframe src={note.imageUrl} className="w-full h-80 border-none" title="pdf-viewer"></iframe>
                                        ) : (
                                            <img src={note.imageUrl} className="w-full h-auto block object-contain" onClick={() => window.open(note.url, '_blank')} />
                                        )}
                                    </div>
                                ) : null}

                                <div className="flex flex-col gap-2 mt-2 px-1" onPointerDown={e => e.stopPropagation()}>
                                    <input type="url" className="w-full text-[10px] p-2 border border-blue-100 rounded bg-gray-50 shadow-inner outline-none focus:border-blue-300" placeholder="Paste link..." defaultValue={note.url} onBlur={handleUrlSave} />
                                    {/* 🌟 FIX BUGS: Default 10 Line */}
                                    <textarea 
                                        className="w-full text-xs font-medium bg-transparent outline-none resize-none text-gray-700 placeholder-gray-400 max-h-[240px] overflow-y-auto menu-scroll" 
                                        placeholder="Tambah nota / tajuk untuk link ini..." 
                                        defaultValue={note.text} 
                                        onBlur={(e) => db.collection("notes").doc(note.id).update({ text: e.target.value })} 
                                        rows="10" 
                                    ></textarea>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
